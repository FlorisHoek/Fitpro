<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitPro">
<title>FitPro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0eeea;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#6b6b66;--text3:#9e9e98;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-mid:#378ADD;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-mid:#1D9E75;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;gap:4px;padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;align-items:center}
.nav-title{font-size:16px;font-weight:500;margin-right:8px;letter-spacing:-0.3px}
.nav button{padding:7px 14px;border-radius:var(--radius);border:0.5px solid transparent;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif}
.nav button.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.nav button:hover:not(.active){background:var(--surface2)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.gcal-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2)}
.gcal-badge.connected{background:var(--green-bg);border-color:#5DCAA5;color:var(--green)}
.gcal-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.page{display:none;padding:20px 16px;max-width:820px;margin:0 auto;width:100%}
.page.active{display:block}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
h3{font-size:15px;font-weight:500}
.btn{padding:7px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--text);color:var(--surface);border-color:transparent}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{border-color:#E24B4A;color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-google{background:var(--blue-bg);border-color:#85B7EB;color:#0C447C}
.btn-google:hover{background:#B5D4F4}
input,select,textarea{width:100%;padding:8px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:72px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;color:var(--text2);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:12px;font-weight:500}
.badge-teal{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.ritten-bar{height:8px;border-radius:50px;background:var(--surface2);overflow:hidden;margin-top:6px}
.ritten-fill{height:100%;border-radius:50px;transition:width .4s}
.ritten-fill.green{background:var(--green-mid)}
.ritten-fill.amber{background:#EF9F27}
.ritten-fill.red{background:#E24B4A}
.stats-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:var(--surface2);border-radius:var(--radius);padding:12px}
.stat-card .val{font-size:22px;font-weight:500;margin-top:4px}
.stat-card .lbl{font-size:12px;color:var(--text2)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cal-day-label{text-align:center;font-size:11px;color:var(--text2);padding:4px 0;font-weight:500}
.cal-day{min-height:56px;border-radius:var(--radius);border:0.5px solid var(--border);padding:5px;cursor:pointer;transition:all .15s;background:var(--surface)}
.cal-day:hover{border-color:var(--border2)}
.cal-day.today{border-color:var(--blue);background:var(--blue-bg)}
.cal-day.selected{border-color:var(--blue);background:var(--blue-bg)}
.cal-day.other-month{opacity:.35}
.cal-day .day-num{font-size:11px;font-weight:500;color:var(--text2)}
.cal-day.today .day-num,.cal-day.selected .day-num{color:var(--blue)}
.event-dot{font-size:10px;background:var(--green-mid);color:white;border-radius:4px;padding:1px 4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-dot.gcal{background:var(--blue)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border:0.5px solid var(--border)}
.modal h3{margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;flex-wrap:wrap}
.afspraken-list .item{padding:10px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.afspraken-list .item:last-child{border-bottom:none}
.time-badge{background:var(--surface2);border-radius:var(--radius);padding:4px 10px;font-size:12px;font-weight:500;white-space:nowrap;text-align:center;font-family:'DM Mono',monospace}
.empty{text-align:center;padding:32px 20px;color:var(--text2);font-size:14px}
.setup-box{background:var(--blue-bg);border:0.5px solid #85B7EB;border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.info-box{border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-top:8px;line-height:1.6}
.info-green{background:var(--green-bg);color:var(--green)}
.info-amber{background:var(--amber-bg);color:var(--amber)}
.info-blue{background:var(--blue-bg);color:var(--blue)}
.section-label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.5px;margin-bottom:8px}
.history-item{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);align-items:flex-start}
.history-item:last-child{border-bottom:none}
.history-dot{width:10px;height:10px;border-radius:50%;background:var(--green-mid);flex-shrink:0;margin-top:4px}
.history-dot.future{background:var(--blue-mid)}
.history-date{font-size:12px;color:var(--text2);white-space:nowrap;min-width:72px;font-family:'DM Mono',monospace;line-height:1.5}
.history-title{font-size:13px;font-weight:500}
.history-sub{font-size:12px;color:var(--text2);margin-top:2px}
.rit-pill{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border-radius:50px;padding:2px 8px;font-size:11px;font-weight:500;margin-top:4px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:13px}
input[type=checkbox]{width:auto;accent-color:var(--blue)}
code{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);padding:1px 6px;border-radius:4px}
.tab-btn{background:transparent;border:0.5px solid transparent;color:var(--text2)}
.tab-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}.stats-row{gap:6px}.stat-card .val{font-size:18px}}
</style>
</head>
<body>
<div id="app">
<div class="nav">
  <span class="nav-title">FitPro</span>
  <button class="active" onclick="showPage('klanten')">Klanten</button>
  <button onclick="showPage('agenda')">Agenda</button>
  <button onclick="showPage('instellingen')">Instellingen</button>
  <div class="nav-right">
    <div class="gcal-badge" id="gcal-badge" onclick="showPage('instellingen')">
      <div class="gcal-dot"></div>
      <span id="gcal-badge-label">Google Agenda</span>
    </div>
  </div>
</div>

<div class="page active" id="page-klanten">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div id="stats-row" class="stats-row" style="flex:1;margin-bottom:0;margin-right:12px"></div>
    <button class="btn btn-primary" onclick="openModal('modal-klant')">+ Klant</button>
  </div>
  <input type="text" id="zoek" placeholder="Zoek op naam..." oninput="renderKlanten()" style="margin-bottom:16px">
  <div id="klanten-list"></div>
</div>

<div class="page" id="page-agenda">
  <div class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-sm" onclick="changeMonth(-1)">←</button>
        <h3 id="maand-label"></h3>
        <button class="btn btn-sm" onclick="changeMonth(1)">→</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="sync-btn" onclick="syncGCal()" style="display:none">↻ Sync</button>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-afspraak')">+ Afspraak</button>
      </div>
    </div>
    <div class="calendar-grid" id="cal-headers"></div>
    <div class="calendar-grid" id="cal-grid"></div>
  </div>
  <div class="card">
    <div class="card-header">
      <h3 id="dag-label">Selecteer een dag</h3>
      <span id="dag-sync-status" style="font-size:12px;color:var(--text2)"></span>
    </div>
    <div id="dag-afspraken" class="afspraken-list"></div>
  </div>
</div>

<div class="page" id="page-instellingen">
  <div class="card">
    <div class="card-header"><h3>Google Agenda koppeling</h3></div>
    <div id="gcal-setup-content"></div>
  </div>
  <div class="card" id="gcal-calid-card" style="display:none">
    <div class="card-header"><h3>Agenda ID</h3></div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Kalender ID</label>
      <input id="cal-id-input" placeholder="primary" value="primary">
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Gebruik <code>primary</code> voor je hoofdagenda.</p>
    <button class="btn btn-sm btn-primary" onclick="saveCalId()">Opslaan</button>
  </div>
  <div class="card">
    <div class="card-header"><h3>Data exporteren</h3></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Download al je klantdata als back-up.</p>
    <button class="btn btn-sm" onclick="exportData()">Download back-up (JSON)</button>
  </div>
</div>
</div>

<!-- MODAL: Klant -->
<div class="modal-overlay" id="modal-klant">
<div class="modal">
  <h3 id="klant-modal-title">Nieuwe klant</h3>
  <input type="hidden" id="klant-edit-id">
  <div class="form-grid" style="margin-bottom:12px">
    <div class="form-group"><label>Voornaam *</label><input id="k-naam" placeholder="Jan"></div>
    <div class="form-group"><label>Achternaam</label><input id="k-achternaam" placeholder="Jansen"></div>
    <div class="form-group"><label>Telefoon</label><input id="k-tel" placeholder="06-12345678"></div>
    <div class="form-group"><label>E-mail</label><input id="k-email" type="email" placeholder="jan@email.nl"></div>
  </div>
  <div class="form-group" style="margin-bottom:12px"><label>Rittenkaart</label>
    <select id="k-kaart"><option value="5">5 ritten</option><option value="10" selected>10 ritten</option><option value="20">20 ritten</option></select>
  </div>
  <div class="form-group" style="margin-bottom:12px"><label>Notities</label><textarea id="k-notities" placeholder="Doelen, blessures, bijzonderheden..."></textarea></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('modal-klant')">Annuleren</button>
    <button class="btn btn-primary" onclick="slaKlantOp()">Opslaan</button>
  </div>
</div>
</div>

<!-- MODAL: Klant detail met tabs -->
<div class="modal-overlay" id="modal-detail">
<div class="modal" style="max-width:560px">
  <div id="detail-header"></div>
  <div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:0.5px solid var(--border);padding-bottom:8px">
    <button class="btn btn-sm tab-btn active" id="tab-overzicht" onclick="switchTab('overzicht')">Overzicht</button>
    <button class="btn btn-sm tab-btn" id="tab-historie" onclick="switchTab('historie')">Trainingshistorie</button>
  </div>
  <div id="tab-content-overzicht"></div>
  <div id="tab-content-historie" style="display:none"></div>
  <div class="modal-footer">
    <button class="btn btn-danger btn-sm" onclick="verwijderKlant()">Verwijderen</button>
    <button class="btn btn-sm" onclick="bewerkKlant()">Bewerken</button>
    <button class="btn btn-primary btn-sm" onclick="openRitModal()">Rit registreren</button>
    <button class="btn btn-sm" onclick="closeModal('modal-detail')">Sluiten</button>
  </div>
</div>
</div>

<!-- MODAL: Rit registreren -->
<div class="modal-overlay" id="modal-rit">
<div class="modal" style="max-width:400px">
  <h3>Rit registreren</h3>
  <p id="rit-klant-naam" style="font-size:13px;color:var(--text2);margin-bottom:16px"></p>
  <div class="form-group" style="margin-bottom:12px"><label>Datum van training</label><input type="date" id="rit-datum"></div>
  <div class="form-group" style="margin-bottom:12px"><label>Notitie (optioneel)</label><input id="rit-notitie" placeholder="Bijv. benen, cardio, intake..."></div>
  <div class="form-group" style="margin-bottom:4px"><label>Ritten gebruikt</label>
    <select id="rit-aantal"><option value="1">1 rit</option><option value="2">2 ritten</option></select>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('modal-rit')">Annuleren</button>
    <button class="btn btn-primary" onclick="bevestigRit()">Opslaan</button>
  </div>
</div>
</div>

<!-- MODAL: Afspraak -->
<div class="modal-overlay" id="modal-afspraak">
<div class="modal">
  <h3>Afspraak inplannen</h3>
  <div class="form-group" style="margin-bottom:12px"><label>Klant</label>
    <select id="a-klant" onchange="updateUitnodingInfo()"><option value="">Selecteer klant</option></select>
  </div>
  <div class="form-grid" style="margin-bottom:12px">
    <div class="form-group"><label>Datum</label><input type="date" id="a-datum"></div>
    <div class="form-group"><label>Tijd</label><input type="time" id="a-tijd" value="09:00"></div>
  </div>
  <div class="form-group" style="margin-bottom:12px"><label>Duur</label>
    <select id="a-duur"><option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>60 min</option><option value="90">90 min</option></select>
  </div>
  <div class="form-group" style="margin-bottom:12px"><label>Notitie</label><input id="a-notitie" placeholder="Bijv. benen dag, intake..."></div>
  <div style="border-top:0.5px solid var(--border);padding-top:12px;margin-top:4px">
    <div class="section-label">UITNODIGINGEN</div>
    <div class="toggle-row"><label>Google Agenda uitnodiging naar klant</label><input type="checkbox" id="a-gcal-invite" checked></div>
    <div class="toggle-row"><label>Apart uitnodigings-e-mail (mailto)</label><input type="checkbox" id="a-email-invite" checked></div>
    <div id="uitnodiging-info"></div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('modal-afspraak')">Annuleren</button>
    <button class="btn btn-primary" onclick="slaAfspraakOp()">Inplannen</button>
  </div>
</div>
</div>

<!-- MODAL: Resultaat -->
<div class="modal-overlay" id="modal-result">
<div class="modal" style="max-width:400px">
  <h3 id="result-title"></h3>
  <div id="result-body" style="font-size:14px;color:var(--text2);margin-top:8px;line-height:1.8"></div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal('modal-result')">OK</button></div>
</div>
</div>

<script>
const AVATARCOLORS=[['#E1F5EE','#0F6E56'],['#E6F1FB','#185FA5'],['#FAEEDA','#854F0B'],['#FBEAF0','#993556'],['#EAF3DE','#3B6D11'],['#EEEDFE','#534AB7']];
let klanten=[],afspraken=[],trainingen=[],viewDate=new Date(),selectedDay=null,detailId=null;
let gcalToken=null,gcalClientId=null,gcalCalId='primary';

function load(){
  klanten=JSON.parse(localStorage.getItem('pt_klanten')||'[]');
  afspraken=JSON.parse(localStorage.getItem('pt_afspraken')||'[]');
  trainingen=JSON.parse(localStorage.getItem('pt_trainingen')||'[]');
  gcalClientId=localStorage.getItem('pt_gcal_client_id')||null;
  gcalCalId=localStorage.getItem('pt_gcal_cal_id')||'primary';
}
function save(){
  localStorage.setItem('pt_klanten',JSON.stringify(klanten));
  localStorage.setItem('pt_afspraken',JSON.stringify(afspraken));
  localStorage.setItem('pt_trainingen',JSON.stringify(trainingen));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function initials(k){return((k.naam||'?')[0]+(k.achternaam||'')[0]||'').toUpperCase()}
function avatarColor(id){return AVATARCOLORS[id.charCodeAt(0)%AVATARCOLORS.length]}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDatum(d){return new Date(d+'T00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'})}
function fmtDatumLang(d){return new Date(d+'T00:00').toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function ritBarClass(k){const p=k.ritResterend/k.ritTotaal;return p>0.4?'green':p>0.15?'amber':'red'}
function ritBadge(k){const p=k.ritResterend/k.ritTotaal;const cls=p>0.4?'badge-teal':p>0.15?'badge-amber':'badge-red';return`<span class="badge ${cls}">${k.ritResterend}/${k.ritTotaal} ritten</span>`}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>{if(b.textContent.toLowerCase()===p)b.classList.add('active')});
  if(p==='agenda')renderCalendar();
  if(p==='instellingen')renderInstellingen();
}

function updateGCalBadge(){
  const badge=document.getElementById('gcal-badge');
  const lbl=document.getElementById('gcal-badge-label');
  const syncBtn=document.getElementById('sync-btn');
  if(gcalToken){badge.className='gcal-badge connected';lbl.textContent='Verbonden';if(syncBtn)syncBtn.style.display='';}
  else{badge.className='gcal-badge';lbl.textContent='Google Agenda';if(syncBtn)syncBtn.style.display='none';}
}

function renderStats(){
  const totaal=klanten.length,actief=klanten.filter(k=>k.ritResterend>0).length;
  const bijna=klanten.filter(k=>k.ritResterend>0&&k.ritResterend/k.ritTotaal<=0.2).length;
  const afvandaag=afspraken.filter(a=>a.datum===today()).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="lbl">Klanten</div><div class="val">${totaal}</div></div>
    <div class="stat-card"><div class="lbl">Actief</div><div class="val">${actief}</div></div>
    <div class="stat-card"><div class="lbl">Bijna op</div><div class="val" style="color:var(--red)">${bijna}</div></div>
    <div class="stat-card"><div class="lbl">Vandaag</div><div class="val" style="color:var(--blue)">${afvandaag}</div></div>`;
}

function renderKlanten(){
  const q=(document.getElementById('zoek')||{value:''}).value.toLowerCase();
  const filtered=klanten.filter(k=>(k.naam+' '+k.achternaam).toLowerCase().includes(q));
  const el=document.getElementById('klanten-list');
  if(!filtered.length){el.innerHTML='<div class="empty">Geen klanten gevonden.<br>Voeg je eerste klant toe!</div>';return}
  el.innerHTML=filtered.map(k=>{
    const [bg,fg]=avatarColor(k.id);
    const pct=Math.round(k.ritResterend/k.ritTotaal*100);
    const aantalT=trainingen.filter(t=>t.klantId===k.id).length;
    return`<div class="card" style="cursor:pointer" onclick="openDetail('${k.id}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="background:${bg};color:${fg}">${initials(k)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500">${k.naam} ${k.achternaam}</div>
          <div style="font-size:12px;color:var(--text2)">${k.email||k.telefoon||''}</div>

function bevestigRit(){
  const k=klanten.find(x=>x.id===detailId);if(!k)return;
  const aantal=parseInt(document.getElementById('rit-aantal').value)||1;
  if(k.ritResterend<aantal){showResult('Niet genoeg ritten',`${k.naam} heeft nog maar ${k.ritResterend} rit${k.ritResterend!==1?'ten':''} over.`);return}
  trainingen.push({id:uid(),klantId:detailId,datum:document.getElementById('rit-datum').value||today(),notitie:document.getElementById('rit-notitie').value.trim(),aantal,aangemaakt:new Date().toISOString()});

  save();renderKlanten();closeModal('modal-rit');renderDetailOverzicht(detailId);

}

    <div class="form-group" style="margin-bottom:12px"><label>Client ID</label><input id="client-id-field" value="${gcalClientId}"></div>

    </div>`;

  } else {
    el.innerHTML=`<div class="setup-box">
      <p style="font-size:14px;font-weight:500;color:#0C447C;margin-bottom:6px">Eenmalige instelling vereist</p>
      <p style="font-size:13px;color:#185FA5;line-height:1.6">Maak een gratis Google OAuth Client ID aan via <a href="https://console.cloud.google.com" target="_blank" style="color:#0C447C;font-weight:500">console.cloud.google.com</a> en plak hem hieronder.</p>
    </div>
    <div class="form-group" style="margin-bottom:12px"><label>Google OAuth Client ID</label><input id="client-id-field" placeholder="xxxxxxxx.apps.googleusercontent.com"></div>
    <button class="btn btn-google" onclick="saveClientId()">Opslaan & verbinden</button>`;
    calCard.style.display='none';

function saveClientId(){
  const val=(document.getElementById('client-id-field')||{value:''}).value.trim();
  if(!val){alert('Vul een Client ID in');return}
  gcalClientId=val;localStorage.setItem('pt_gcal_client_id',val);connectGCal();
}
function saveCalId(){
  gcalCalId=document.getElementById('cal-id-input').value.trim()||'primary';
  localStorage.setItem('pt_gcal_cal_id',gcalCalId);
  alert('Opgeslagen: '+gcalCalId);
}
function connectGCal(){
  if(!gcalClientId){alert('Voer eerst een Client ID in.');return}
  if(!window.google||!window.google.accounts){
    const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>doGCal();
    s.onerror=()=>showResult('Fout','Kon Google Sign-In niet laden. Controleer je internetverbinding.');
    document.head.appendChild(s);
  } else {doGCal()}
}
function doGCal(){
  try{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:gcalClientId,
      scope:'https://www.googleapis.com/auth/calendar.events',
      callback:(resp)=>{
        if(resp.error){showResult('Fout',`Kon niet verbinden: ${resp.error}`);return}
        gcalToken=resp.access_token;updateGCalBadge();renderInstellingen();
        showResult('Verbonden!','Google Agenda is gekoppeld. Klanten ontvangen voortaan een agenda-uitnodiging bij elke nieuwe afspraak.');
      }
    });
    client.requestAccessToken();
  }catch(e){showResult('Fout',`Kon Google Sign-In niet starten.\n\n${e.message}`);}
}
function disconnectGCal(){gcalToken=null;updateGCalBadge();renderInstellingen()}

async function pushAfspraakToGCal(a,klantEmail,metUitnodiging){
  if(!gcalToken)return false;
  const kl=klanten.find(x=>x.id===a.klantId);
  const naam=kl?`${kl.naam} ${kl.achternaam}`:'Training';
  const start=new Date(`${a.datum}T${a.tijd}`);
  const end=new Date(start.getTime()+parseInt(a.duur)*60000);
  const body={
    summary:`PT: ${naam}`,
    description:(a.notitie||'Personal training sessie')+'\n\nIngepland via FitPro.',
    start:{dateTime:start.toISOString()},
    end:{dateTime:end.toISOString()}
  };
  if(metUitnodiging&&klantEmail){
    body.attendees=[{email:klantEmail,displayName:naam,responseStatus:'needsAction'}];
  }
  try{
    const url=a.gcalEventId
      ?`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(gcalCalId)}/events/${a.gcalEventId}?sendUpdates=all`
      :`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(gcalCalId)}/events?sendUpdates=all`;
    const method=a.gcalEventId?'PUT':'POST';
    const resp=await fetch(url,{method,headers:{'Authorization':`Bearer ${gcalToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok){const err=await resp.json();if(err.error?.code===401){gcalToken=null;updateGCalBadge();}return false}
    const data=await resp.json();
    a.gcalEventId=data.id;save();return true;
  }catch(e){return false}
}
async function deleteAfspraakFromGCal(a){
  if(!gcalToken||!a.gcalEventId)return;
  try{await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(gcalCalId)}/events/${a.gcalEventId}?sendUpdates=all`,{method:'DELETE',headers:{'Authorization':`Bearer ${gcalToken}`}})}catch(e){}
}
async function syncGCal(){
  if(!gcalToken){showResult('Niet verbonden','Koppel eerst je Google Agenda via Instellingen.');return}
  const komende=afspraken.filter(a=>a.datum>=today());
  let ok=0,fail=0;
  for(const a of komende){const kl=klanten.find(x=>x.id===a.klantId);const r=await pushAfspraakToGCal(a,kl?.email,true);r?ok++:fail++;}
  showResult('Sync klaar',`${ok} afspraak${ok!==1?'en':''} gesynchroniseerd${fail?`, ${fail} mislukt`:''}.`);
}

/* AGENDA */
function renderCalendar(){
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  document.getElementById('maand-label').textContent=new Date(y,m,1).toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
  document.getElementById('cal-headers').innerHTML=['Ma','Di','Wo','Do','Vr','Za','Zo'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const firstDay=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  let cells='';
  const todayStr=today();
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day other-month"><div class="day-num">${prevDays-firstDay+1+i}</div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ev=afspraken.filter(a=>a.datum===ds);
    const cls=[ds===todayStr?'today':'',ds===selectedDay?'selected':''].filter(Boolean).join(' ');
    cells+=`<div class="cal-day ${cls}" onclick="selectDay('${ds}')"><div class="day-num">${d}</div>${ev.slice(0,2).map(a=>{const kl=klanten.find(x=>x.id===a.klantId);return`<div class="event-dot${a.gcalEventId?' gcal':''}">${kl?kl.naam.slice(0,5):''} ${a.tijd}</div>`}).join('')}${ev.length>2?`<div style="font-size:9px;color:var(--text2)">+${ev.length-2}</div>`:''}</div>`;
  }
  const rem=(7-((firstDay+daysInMonth)%7))%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=cells;
  if(selectedDay)renderDagAfspraken(selectedDay);
}
function selectDay(ds){selectedDay=ds;renderCalendar()}
function renderDagAfspraken(ds){
  document.getElementById('dag-label').textContent=new Date(ds+'T00:00').toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const ev=afspraken.filter(a=>a.datum===ds).sort((a,b)=>a.tijd.localeCompare(b.tijd));
  const el=document.getElementById('dag-afspraken');
  const syncEl=document.getElementById('dag-sync-status');
  syncEl.innerHTML=gcalToken&&ev.length?`<span style="color:var(--green)">${ev.filter(a=>a.gcalEventId).length}/${ev.length} in Google</span>`:'';
  if(!ev.length){el.innerHTML='<div class="empty" style="padding:20px">Geen afspraken op deze dag</div>';return}
  el.innerHTML=ev.map(a=>{
    const kl=klanten.find(x=>x.id===a.klantId);
    const [bg,fg]=kl?avatarColor(kl.id):['#E1F5EE','#0F6E56'];
    return`<div class="item"><div class="time-badge">${a.tijd}</div><div class="avatar" style="background:${bg};color:${fg};width:32px;height:32px;font-size:12px">${kl?initials(kl):'?'}</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500">${kl?kl.naam+' '+kl.achternaam:'Onbekend'}</div><div style="font-size:12px;color:var(--text2)">${a.duur} min${a.notitie?' · '+a.notitie:''}${a.gcalEventId?' · <span style="color:var(--blue)">Google</span>':''}</div></div><button class="btn btn-sm btn-danger" onclick="verwijderAfspraak('${a.id}')">×</button></div>`
  }).join('');
}

  const klantId=document.getElementById('a-klant').value;
  const datum=document.getElementById('a-datum').value;
  const tijd=document.getElementById('a-tijd').value;
  if(!klantId||!datum||!tijd){alert('Vul klant, datum en tijd in');return}
  const gcalInvite=document.getElementById('a-gcal-invite').checked;
  const emailInvite=document.getElementById('a-email-invite').checked;
  const a={id:uid(),klantId,datum,tijd,duur:document.getElementById('a-duur').value,notitie:document.getElementById('a-notitie').value.trim()};
  afspraken.push(a);save();
  closeModal('modal-afspraak');
  document.getElementById('a-notitie').value='';
  const kl=klanten.find(x=>x.id===klantId);
  const heeftEmail=!!(kl&&kl.email);
  const resultLines=[];
  if(gcalToken&&gcalInvite){
    const ok=await pushAfspraakToGCal(a,heeftEmail?kl.email:null,heeftEmail);
    if(ok) resultLines.push(`<span style="color:var(--green)">✓</span> Toegevoegd aan Google Agenda${heeftEmail?' — uitnodiging verstuurd naar <strong>'+kl.email+'</strong>':' (geen e-mail — klant niet uitgenodigd)'}`);
    else resultLines.push(`<span style="color:var(--red)">✗</span> Google Agenda sync mislukt`);
  }
  if(emailInvite&&heeftEmail){
    stuurEmailUitnodiging(a,kl);
    resultLines.push(`<span style="color:var(--green)">✓</span> E-mailclient geopend voor <strong>${kl.email}</strong>`);
  } else if(emailInvite&&!heeftEmail){
    resultLines.push(`<span style="color:var(--amber)">⚠</span> Geen e-mailadres bekend — apart e-mailbericht overgeslagen`);
  }
  if(resultLines.length) showResult('Afspraak ingepland',resultLines.join('<br>'));
  selectDay(datum);renderCalendar();
}

async function verwijderAfspraak(id){
  if(!confirm('Afspraak verwijderen?'))return;
  const a=afspraken.find(x=>x.id===id);
  if(a&&gcalToken)await deleteAfspraakFromGCal(a);
  afspraken=afspraken.filter(x=>x.id!==id);
  save();renderDagAfspraken(selectedDay||today());renderCalendar();
}

function exportData(){
  const data={klanten,afspraken,trainingen,exportDatum:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='fitpro-backup.json';a.click();
  URL.revokeObjectURL(url);
}

['modal-afspraak','modal-klant','modal-detail','modal-result','modal-rit'].forEach(id=>{
  const m=document.getElementById(id);
  if(m)m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')});
});
const _open=openModal;
window.openModal=function(id){if(id==='modal-afspraak')vulAfspraakModal();_open(id)};

load();renderKlanten();renderStats();updateGCalBadge();selectedDay=today();
</script>
</body>
</html>
